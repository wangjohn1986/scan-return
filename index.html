<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="未取貨助手">
  <meta name="theme-color" content="#16a34a">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="stylesheet" href="style.css">
  <title>未取貨助手</title>
</head>
<body>
  <header class="top">
    <span class="top-title">📥 未取貨助手</span>
    <span class="hdr-prog" id="hdr-count">QR掃碼 0　文字掃描 0　合計 0</span>
  </header>

  <!-- 鏡頭舞台 -->
  <section class="stage" id="stage">
    <video id="video" playsinline muted autoplay></video>
    <canvas id="frame-canvas" hidden></canvas>


    <!-- 黃框遮罩層 -->
    <div class="overlay" id="overlay">
      <div class="guide" id="guide">掃描 QR Code</div>
      <div class="frame" id="frame"></div>
      <div class="ocr-hint" id="ocr-hint" hidden>辨識中…</div>
    </div>

    <button class="start-cam" id="start-cam" type="button">點擊開啟鏡頭</button>

    <!-- 模式 B：拍照／選照片 批次辨識 -->
    <button class="batch-btn" id="batch-btn" type="button" hidden>拍照辨識</button>
    <input id="photo-input" type="file" accept="image/*" capture="environment" hidden>

    <!-- 辨識中遮罩 -->
    <div class="busy" id="busy" hidden><div class="busy-box"><div class="busy-spin"></div><div class="busy-sub" id="busy-sub">辨識中…</div></div></div>

    <button class="fab" id="fab" type="button" aria-label="切換掃描模式">
      <span class="fab-mode" id="fab-mode">QR</span>
      <span class="fab-label" id="fab-label">掃碼</span>
    </button>

    <div class="toast" id="toast"></div>
  </section>

  <!-- 掃描清單 -->
  <main class="main">
    <div class="list-head">
      <span>掃描清單</span>
      <span class="counts">共 <b id="cnt">0</b> 筆</span>
    </div>
    <div class="conn-status" id="conn-status">
      <span class="conn-dot" id="conn-dot"></span>
      <span class="conn-label" id="conn-label">蝦皮助手：偵測中…</span>
    </div>
    <div class="list-tools">
      <button id="copy-list" class="tool-btn primary" type="button" disabled>等待連線…</button>
      <button id="clear-all" class="tool-btn danger" type="button">清除全部</button>
    </div>
    <p class="conn-hint">執行前請確認「未取貨助手」插件已開啟並處於未取貨頁面。</p>
    <div class="list" id="list"></div>
    <p class="empty" id="empty">尚無資料，請開啟鏡頭開始掃描。</p>
  </main>

  <!-- 音效設定已移除：提示音固定「上升鈴」、音量請用手機音量鍵調整 -->

  <!-- A：框選欄位 -->
  <div class="modal" id="crop" hidden>
    <div class="modal-box crop-box">
      <div class="modal-head">用手指框出「物流編號」那一欄</div>
      <div class="crop-hint">在下圖拖曳框出要辨識的範圍 → 按「辨識選取區」；或直接「整張辨識」。</div>
      <div class="crop-wrap"><canvas id="crop-cv"></canvas></div>
      <div class="modal-foot">
        <button id="crop-ok" class="btn save" type="button">辨識選取區</button>
        <button id="crop-cancel" class="btn cancel" type="button">取消</button>
      </div>
    </div>
  </div>

  <!-- B：疑似清單手動修正 -->
  <div class="modal" id="suspect" hidden>
    <div class="modal-box">
      <div class="modal-head">疑似編號（修正後加入）<button id="suspect-close" class="x" type="button" aria-label="關閉">✕</button></div>
      <div class="crop-hint">以下字數不是 TW＋13，可能少認或多認一碼。改成正確的 15 字後按「加入」。</div>
      <div id="suspect-list" class="sus-list"></div>
      <div class="modal-foot"><button id="suspect-done" class="btn save" type="button">完成</button></div>
    </div>
  </div>

  <!-- 確認彈窗 -->
  <div class="modal" id="dialog" hidden>
    <div class="modal-box">
      <div class="dialog-title" id="dialog-title" hidden></div>
      <div class="dialog-text" id="dialog-text"></div>
      <div class="modal-foot" id="dialog-foot"></div>
    </div>
  </div>

  <!-- 外部函式庫：jsQR(條碼後備)、Tesseract(OCR)。離線時需先連線載入過 -->
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
