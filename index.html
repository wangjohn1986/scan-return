<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="退貨助手">
  <meta name="theme-color" content="#16a34a">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="stylesheet" href="style.css">
  <title>退貨助手</title>
</head>
<body>
  <header class="top">
    <span class="top-title">↩ 退貨助手</span>
    <span class="hdr-prog" id="hdr-count">已掃 0</span>
    <button id="settings-btn" class="gear" type="button" aria-label="設定">⚙</button>
  </header>

  <!-- 鏡頭舞台 -->
  <section class="stage" id="stage">
    <video id="video" playsinline muted autoplay></video>
    <canvas id="frame-canvas" hidden></canvas>

    <div class="counter" id="counter">已掃描 0 筆</div>

    <!-- 黃框遮罩層 -->
    <div class="overlay" id="overlay">
      <div class="guide" id="guide">請掃描二維碼</div>
      <div class="frame" id="frame"></div>
      <div class="ocr-hint" id="ocr-hint" hidden>辨識中…</div>
    </div>

    <button class="start-cam" id="start-cam" type="button">📷 點擊開啟鏡頭</button>

    <!-- 模式 B：拍照／選照片 批次辨識 -->
    <button class="batch-btn" id="batch-btn" type="button" hidden>📷 拍照／選照片　批次辨識</button>
    <input id="photo-input" type="file" accept="image/*" hidden>

    <!-- 辨識中遮罩 -->
    <div class="busy" id="busy" hidden><div class="busy-box"><div class="busy-spin"></div><div class="busy-sub" id="busy-sub">辨識中…</div></div></div>

    <button class="fab" id="fab" type="button" aria-label="切換掃描模式">
      <span class="fab-mode" id="fab-mode">A</span>
      <span class="fab-label" id="fab-label">條碼</span>
    </button>

    <div class="toast" id="toast"></div>
  </section>

  <!-- 掃描清單 -->
  <main class="main">
    <div class="list-head">
      <span>掃描清單</span>
      <span class="counts">共 <b id="cnt">0</b> 筆</span>
    </div>
    <div class="list-tools">
      <button id="copy-list" class="tool-btn primary" type="button">上傳至 LINE</button>
      <button id="clear-all" class="tool-btn danger" type="button">清除全部</button>
    </div>
    <div class="list" id="list"></div>
    <p class="empty" id="empty">尚無資料，請開啟鏡頭開始掃描。</p>
  </main>

  <!-- 音效設定 -->
  <div class="modal" id="settings" hidden>
    <div class="modal-box">
      <div class="modal-head">音效設定 <button id="settings-close" class="x" type="button" aria-label="關閉">✕</button></div>
      <label class="lab">提示音效</label>
      <select id="snd-type" class="sel">
        <option value="beep">經典嗶</option>
        <option value="ding">清脆叮</option>
        <option value="double">雙嗶</option>
        <option value="low">低音嘟</option>
        <option value="chime">上升鈴</option>
      </select>
      <label class="lab chk" style="margin-top:14px;"><input type="checkbox" id="snd-on"> 開啟掃描提示音</label>
      <label class="lab" style="margin-top:14px;">音量：<b id="snd-vol-v">60</b></label>
      <input type="range" id="snd-vol" min="0" max="100" step="5">
      <div class="modal-foot">
        <button id="snd-test" class="btn" style="background:#475569" type="button">試聽</button>
        <button id="settings-cancel" class="btn cancel" type="button">取消</button>
        <button id="settings-save" class="btn save" type="button">儲存</button>
      </div>
    </div>
  </div>

  <!-- 確認彈窗 -->
  <div class="modal" id="dialog" hidden>
    <div class="modal-box">
      <div class="dialog-text" id="dialog-text"></div>
      <div class="modal-foot" id="dialog-foot"></div>
    </div>
  </div>

  <!-- 外部函式庫：jsQR(條碼後備)、Tesseract(OCR)。離線時需先連線載入過 -->
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
